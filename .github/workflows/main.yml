name: Actualizar Ventilacion

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ventilacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          pip install beautifulsoup4 lxml

      - name: Obtener ventilacion
        run: |
          python3 << 'EOF'
          import json
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime

          url = "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/"

          html = requests.get(url, timeout=30).text

          soup = BeautifulSoup(html, "lxml")

          texto = soup.get_text("\n", strip=True)

          lineas = [x.strip() for x in texto.splitlines() if x.strip()]

          fecha_pronostico = ""
          hora_pronostico = ""
          codigo = ""

          for i, linea in enumerate(lineas):

              if linea == "Fecha:" and i + 1 < len(lineas):
                  fecha_pronostico = lineas[i + 1]

              if linea == "Hora:" and i + 1 < len(lineas):
                  hora_pronostico = lineas[i + 1].replace(" Horas", "")

          for i, linea in enumerate(lineas):

              if linea == "Condición de ventilación":

                  try:
                      idx_condicion = lineas.index("Condición", i)

                      if idx_condicion + 1 < len(lineas):
                          codigo = lineas[idx_condicion + 1]

                      break

                  except Exception:
                      pass

          estados = {
              "B": "BUENA",
              "R": "REGULAR",
              "M": "MALA"
          }

          resultado = {
              "fecha_pronostico": fecha_pronostico,
              "hora_pronostico": hora_pronostico,
              "codigo": codigo,
              "estado": estados.get(codigo, "DESCONOCIDO"),
              "actualizado": datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          }

          with open("ventilacion.json", "w", encoding="utf-8") as f:
              json.dump(resultado, f, indent=2, ensure_ascii=False)

          print(json.dumps(resultado, indent=2, ensure_ascii=False))
          EOF

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ventilacion.json

          if ! git diff --cached --quiet; then
            git commit -m "Actualizar ventilacion"
            git push
          else
            echo "Sin cambios"
          fi
