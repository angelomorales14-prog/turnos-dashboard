name: Actualizar Ventilacion

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ventilacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          pip install beautifulsoup4 lxml

      - name: Obtener ventilacion
        run: |
          python3 << 'EOF'
          import requests
          import json
          from bs4 import BeautifulSoup

          url = "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/"

          html = requests.get(url, timeout=30).text

          soup = BeautifulSoup(html, "lxml")

          texto = soup.get_text("\n", strip=True)

          lineas = [l.strip() for l in texto.splitlines() if l.strip()]

          idx = lineas.index("Condición de ventilación")

          hora = None
          codigo = None

          for i in range(idx, len(lineas)):

              if lineas[i] == "Hora":
                  hora = lineas[i + 1]

              if lineas[i] == "Condición":
                  codigo = lineas[i + 1]
                  break

          estados = {
              "B": "BUENA",
              "R": "REGULAR",
              "M": "MALA"
          }

          resultado = {
              "hora": hora,
              "codigo": codigo,
              "estado": estados.get(codigo, "DESCONOCIDO")
          }

          with open("ventilacion.json", "w", encoding="utf-8") as f:
              json.dump(resultado, f, indent=2, ensure_ascii=False)

          print(resultado)

          EOF

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ventilacion.json

          if ! git diff --cached --quiet; then
            git commit -m "Actualizar ventilacion"
            git push
          fi
