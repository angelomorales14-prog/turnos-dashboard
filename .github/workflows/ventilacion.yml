name: Actualizar Ventilacion

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ventilacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          pip install beautifulsoup4 lxml

      - name: Obtener ventilacion
        run: |
          python3 << 'EOF'
          import json
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          from zoneinfo import ZoneInfo

          url = "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/"

          html = requests.get(url, timeout=30).text

          soup = BeautifulSoup(html, "lxml")

          texto = soup.get_text("\n", strip=True)

          lineas = [x.strip() for x in texto.splitlines() if x.strip()]

          for i, linea in enumerate(lineas):
              if "Condición de ventilación" in linea:
                  print("\n=== BLOQUE ENCONTRADO ===")
                  for x in lineas[i:i+80]:
                      print(x)

          # Hora actual Chile
          ahora = datetime.now(ZoneInfo("America/Santiago"))
          hora_actual = ahora.strftime("%H:00")

          # Buscar primer bloque de ventilación
          idx = lineas.index("Condición de ventilación")

          horas = []
          condiciones = []

          for i, linea in enumerate(lineas):

              # Capturar todas las horas
              if len(linea) == 5 and ":" in linea:
                  horas.append(linea)

              # Capturar todos los códigos B/R/M
              if linea in ["B", "R", "M"]:
                  condiciones.append(linea)

          print("HORAS:")
          print(horas)

          print("CONDICIONES:")
          print(condiciones)


          print("TOTAL LINEAS:", len(lineas))

          for l in lineas:
              if ":" in l or l in ["B", "R", "M"]:
                  print(l)

          tabla = dict(zip(horas, condiciones))

          print("TABLA:")
          print(tabla)

          codigo = tabla.get(hora_actual)

          estados = {
              "B": "BUENA",
              "R": "REGULAR",
              "M": "MALA"
          }

          resultado = {
              "hora_actual": hora_actual,
              "codigo": codigo,
              "estado": estados.get(codigo, "SIN DATOS"),
              "actualizado": ahora.strftime("%d-%m-%Y %H:%M")
          }

          with open("ventilacion.json", "w", encoding="utf-8") as f:
              json.dump(resultado, f, indent=2, ensure_ascii=False)

          print(json.dumps(resultado, indent=2, ensure_ascii=False))
          EOF

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ventilacion.json

          if ! git diff --cached --quiet; then
            git commit -m "Actualizar ventilacion"
            git push
          else
            echo "Sin cambios"
          fi
