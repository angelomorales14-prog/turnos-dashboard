name: Actualizar Ventilacion

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ventilacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          pip install beautifulsoup4 lxml

      - name: Obtener ventilacion
        run: |
          python3 << 'EOF'
          import json
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          from zoneinfo import ZoneInfo

          url = "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/"

          html = requests.get(url, timeout=30).text

          soup = BeautifulSoup(html, "lxml")

          texto = soup.get_text("\n", strip=True)

          lineas = [x.strip() for x in texto.splitlines() if x.strip()]

          # Hora actual Chile
          ahora = datetime.now(ZoneInfo("America/Santiago"))
          hora_actual = ahora.strftime("%H:00")

          # Buscar primer bloque de ventilación
          idx = lineas.index("Condición de ventilación")

          horas = []
          condiciones = []

          # Extraer horas
          for i in range(idx, len(lineas)):
              if lineas[i] == "Hora":
                  j = i + 1

                  while j < len(lineas):
                      valor = lineas[j]

                      if valor == "Condición":
                          break

                      if ":" in valor:
                          horas.append(valor)

                      j += 1

                  break

          # Extraer condiciones
          for i in range(idx, len(lineas)):
              if lineas[i] == "Condición":

                  j = i + 1

                  while j < len(lineas):

                      valor = lineas[j]

                      if valor == "Condición de ventilación":
                          break

                      if valor in ["B", "R", "M"]:
                          condiciones.append(valor)

                      j += 1

                  break

          print("HORAS:")
          print(horas)

          print("CONDICIONES:")
          print(condiciones)

          tabla = dict(zip(horas, condiciones))

          codigo = tabla.get(hora_actual)

          estados = {
              "B": "BUENA",
              "R": "REGULAR",
              "M": "MALA"
          }

          resultado = {
              "hora_actual": hora_actual,
              "codigo": codigo,
              "estado": estados.get(codigo, "SIN DATOS"),
              "actualizado": ahora.strftime("%d-%m-%Y %H:%M")
          }

          with open("ventilacion.json", "w", encoding="utf-8") as f:
              json.dump(resultado, f, indent=2, ensure_ascii=False)

          print(json.dumps(resultado, indent=2, ensure_ascii=False))
          EOF

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ventilacion.json

          if ! git diff --cached --quiet; then
            git commit -m "Actualizar ventilacion"
            git push
          else
            echo "Sin cambios"
          fi
