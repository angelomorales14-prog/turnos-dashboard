name: Test Ventilacion

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar HTML
        run: |
          curl -L "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/" -o ventilacion.html

      - name: Buscar ventilacion horaria
        run: |
          grep -oE '[0-9]{2}:[0-9]{2}' ventilacion.html | head -50

      - name: Buscar bloque ventilacion
        run: |
          grep -A 80 -B 20 "13:00" ventilacion.html
