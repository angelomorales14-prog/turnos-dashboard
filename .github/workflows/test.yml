name: Test Ventilacion

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar HTML
      run: |
        curl -L "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/" -o ventilacion.html

    - name: Instalar dependencias
      run: |
        pip install beautifulsoup4 lxml

    - name: Extraer texto visible
      run: |
        python3 << 'EOF'
        from bs4 import BeautifulSoup

        with open("ventilacion.html", "r", encoding="utf-8", errors="ignore") as f:
            html = f.read()

        soup = BeautifulSoup(html, "lxml")

        texto = soup.get_text("\n", strip=True)

        print("========== TEXTO EXTRAIDO ==========")

        lineas = texto.splitlines()

        for i, linea in enumerate(lineas):
            if "13:00" in linea:
                inicio = max(0, i - 20)
                fin = min(len(lineas), i + 80)

                print("\n===== CONTEXTO ENCONTRADO =====\n")

                for x in lineas[inicio:fin]:
                    print(x)

                break
        EOF
