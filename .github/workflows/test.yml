name: Test Ventilacion

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar HTML
      run: |
        curl -L "https://airecqp.mma.gob.cl/pronostico-de-ventilacion/" -o ventilacion.html

    - name: Tamaño archivo
      run: |
        echo "=== TAMAÑO HTML ==="
        wc -c ventilacion.html

    - name: Primeras 200 lineas
      run: |
        echo "=== HEAD HTML ==="
        head -200 ventilacion.html

    - name: Buscar horas
      run: |
        echo "=== HORAS ENCONTRADAS ==="
        grep -oE '[0-9]{2}:[0-9]{2}' ventilacion.html | sort | uniq

    - name: Buscar ventilacion
      run: |
        echo "=== VENTILACION ==="
        grep -i -n "ventil" ventilacion.html | head -200 || true

    - name: Buscar scripts externos
      run: |
        echo "=== SCRIPTS ==="
        grep -oE 'src="[^"]+"' ventilacion.html | sort | uniq || true

    - name: Buscar JSON API AJAX
      run: |
        echo "=== JSON AJAX API ==="
        grep -i -n "json\|ajax\|fetch\|api\|xmlhttprequest" ventilacion.html | head -200 || true

    - name: Buscar tablas
      run: |
        echo "=== TABLE ==="
        grep -i -n "<table" ventilacion.html | head -100 || true

    - name: Buscar SVG
      run: |
        echo "=== SVG ==="
        grep -i -n "<svg" ventilacion.html | head -100 || true

    - name: Buscar Canvas
      run: |
        echo "=== CANVAS ==="
        grep -i -n "<canvas" ventilacion.html | head -100 || true

    - name: Buscar Imagenes
      run: |
        echo "=== IMG ==="
        grep -oE 'src="[^"]+\.(png|jpg|jpeg|gif|webp)"' ventilacion.html | sort | uniq || true

    - name: Descargar JS principal
      run: |
        curl -L "https://airecqp.mma.gob.cl/wp-content/uploads/essential-addons-elementor/eael-9322.js" -o eael.js || true

    - name: Buscar datos en JS
      run: |
        echo "=== JS ==="
        grep -i -n "ventil\|json\|api\|ajax\|hora\|13:00" eael.js | head -200 || true
   
