<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Operaciones Marítimas TMQ</title>

<meta http-equiv="refresh" content="600">

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #07141f, #0b1e2d);
  color: white;
  overflow: hidden;
}

/* =========================
   HEADER CORPORATIVO
========================= */

.header {
  height: 90px;

  background: linear-gradient(
    90deg,
    #0d2435 0%,
    #12344d 50%,
    #0d2435 100%
  );

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 34px;

  border-bottom: 1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 4px 18px rgba(0,0,0,0.45),
    0 0 12px rgba(64,196,255,0.04);
}

.header-left {
  display: flex;
  align-items: center;
}

.logo {
  height: 96px;
  object-fit: contain;

  filter:
    drop-shadow(0 0 8px rgba(255,255,255,0.05));
}

.header-titles {
  display: flex;
  flex-direction: column;
  justify-content: center;

  margin-left: 100px;
}

.main-title {
  font-size: 30px;
  font-weight: 600;

  letter-spacing: 0.3px;

  color: rgba(255,255,255,0.96);

  line-height: 1.1;
}

.sub-title {
  font-size: 13px;

  margin-top: 7px;

  letter-spacing: 1.8px;

  text-transform: uppercase;

  color: rgba(255,255,255,0.58);
}

/* reloj */

.header-right {
  text-align: right;
}

.clock {
  font-size: 34px;

  font-weight: 500;

  letter-spacing: 1px;

  line-height: 1;

  color: rgba(255,255,255,0.92);

  font-variant-numeric: tabular-nums;
}

.date {
  font-size: 14px;

  margin-top: 8px;

  letter-spacing: 0.7px;

  color: rgba(255,255,255,0.50);
}

/* =========================
   CONTENIDO
========================= */

.main {
  display: flex;
  height: calc(100vh - 130px);
}

.left {
  width: 65%;
  border-right: 2px solid rgba(255,255,255,0.05);
}

.right {
  width: 35%;
  display: flex;
  flex-direction: column;
}

/* =========================
   MAPA
========================= */

.windy-map {
  height: 70%;
  border-bottom: 2px solid rgba(255,255,255,0.05);
}

/* =========================
   KPI PANEL
========================= */

.placeholder {

  height: 30%;

  position: relative;

  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  background:
    linear-gradient(
      180deg,
      rgba(4,14,24,0.98),
      rgba(7,20,32,0.98)
    );
}

/* glow central */

.placeholder::before {

  content: "";

  position: absolute;

  width: 480px;
  height: 480px;

  background:
    radial-gradient(
      circle,
      rgba(0,180,255,0.16),
      transparent 72%
    );

  filter: blur(40px);

  animation: pulseGlow 7s infinite ease-in-out;
}

@keyframes pulseGlow {

  0% {
    transform: scale(1);
    opacity: 0.45;
  }

  50% {
    transform: scale(1.12);
    opacity: 0.75;
  }

  100% {
    transform: scale(1);
    opacity: 0.45;
  }
}

/* =========================
   KPI CARD
========================= */

.kpi-container {

  position: relative;
  z-index: 2;

  width: 100%;
  height: 100%;
}

.kpi-card {

  position: absolute;

  inset: 0;

  padding:
    24px
    38px
    24px
    70px;

  display: flex;

  align-items: center;

  opacity: 0;

  transform: translateY(10px);

  transition:
    opacity 0.8s ease,
    transform 0.8s ease;
}

.kpi-card.active {

  opacity: 1;

  transform: translateY(0);
}

/* izquierda */

.kpi-left {

  display: flex;
  flex-direction: column;
  justify-content: center;

  width: 100%;
}

.kpi-main {

  font-size: 60px;

  font-weight: 700;

  line-height: 1;

  color: rgba(255,255,255,0.98);

  text-shadow:
    0 0 18px rgba(64,196,255,0.12);
}

.kpi-sub {

  margin-top: 12px;

  font-size: 18px;

  color: rgba(255,255,255,0.72);

  letter-spacing: 0.5px;
}

.kpi-period {

  margin-top: 10px;

  font-size: 12px;

  letter-spacing: 2px;

  text-transform: uppercase;

  color: rgba(255,255,255,0.32);
}

/* barra */

.kpi-bottom {

  position: absolute;

  left: 70px;
  right: 70px;
  bottom: 22px;
}

.kpi-progress-bg {

  width: 100%;
  height: 8px;

  border-radius: 999px;

  background: rgba(255,255,255,0.08);

  overflow: hidden;
}

.kpi-progress-fill {

  height: 100%;

  width: 0%;

  border-radius: 999px;

  background:
    linear-gradient(
      90deg,
      #1da1ff,
      #29d3ff
    );

  box-shadow:
    0 0 14px rgba(41,211,255,0.45);

  transition: width 1s ease;
}

/* indicadores */

.kpi-indicator {

  position: absolute;

  left: 22px;
  top: 50%;

  transform: translateY(-50%);

  display: flex;
  flex-direction: column;

  gap: 12px;

  z-index: 10;
}

.dot {

  width: 10px;
  height: 10px;

  border-radius: 50%;

  background: rgba(255,255,255,0.15);

  transition: all 0.4s ease;
}

.dot.active {

  background: rgba(64,196,255,0.98);

  box-shadow:
    0 0 14px rgba(64,196,255,0.7);
}

/* iframe */

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* =========================
   FOOTER
========================= */

.footer {
  height: 40px;

  background: #10293d;

  display: flex;
  align-items: center;

  padding: 0 20px;

  border-top: 1px solid rgba(255,255,255,0.05);

  font-size: 13px;

  opacity: 0.75;
}

/* =========================
   BOTÓN FULLSCREEN
========================= */

.fullscreen-btn {

  position: absolute;

  bottom: 14px;
  right: 14px;

  width: 52px;
  height: 52px;

  border: none;
  border-radius: 14px;

  background:
    linear-gradient(
      145deg,
      rgba(18,52,77,0.95),
      rgba(8,18,28,0.95)
    );

  color: rgba(255,255,255,0.92);

  font-size: 22px;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow:
    0 8px 18px rgba(0,0,0,0.45),
    0 0 10px rgba(64,196,255,0.08);

  border: 1px solid rgba(255,255,255,0.05);

  transition: all 0.2s ease;

  z-index: 20;
}

.fullscreen-btn:hover {

  transform: scale(1.05);
}

/* responsive */

@media (max-width: 900px) {

  .main {
    flex-direction: column;
  }

  .left,
  .right {
    width: 100%;
  }

  .left {
    height: 60%;
  }

  .right {
    height: 40%;
  }

  .header-titles {
    margin-left: 20px;
  }

  .main-title {
    font-size: 22px;
  }

  .kpi-main {
    font-size: 52px;
  }

  .kpi-card {

    padding:
      24px
      20px
      24px
      55px;
  }

  .kpi-bottom {
    left: 55px;
    right: 55px;
  }
}

</style>
</head>

<body>

<div class="header">

  <div class="header-left">

    <img
      class="logo"
      src="logo-enap.png"
      alt="ENAP TMQ"
    >

    <div class="header-titles">

      <div class="main-title">
        División de Operaciones Marítimas
      </div>

      <div class="sub-title">
        TERMINAL MARÍTIMO QUINTERO
      </div>

    </div>

  </div>

  <div class="header-right">

    <div class="clock" id="clock">
      00:00:00
    </div>

    <div class="date" id="headerDate">
      --
    </div>

  </div>

</div>

<div class="main">

  <div class="left">

    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTnbspDFRGu7908VnsnsP4y6opVzD8X2ylAfNAUv9s5oyz_EaFFcgofEwA-Hal_QQ/pubhtml?gid=1384925386&single=true&widget=false&headers=false&t=1">
    </iframe>

  </div>

  <div class="right">

    <div class="windy-map">

      <iframe
        src="https://embed.windy.com/embed2.html?lat=-32.774&lon=-71.496&zoom=16&level=surface&overlay=wind">
      </iframe>

    </div>

    <!-- KPI -->

    <div class="placeholder">

      <div class="kpi-container">

        <!-- KPI 1 -->

        <div class="kpi-card active">

          <div class="kpi-left">

            <div
              class="kpi-main"
              id="kpiVolumen">
              --
            </div>

            <div class="kpi-sub">
              % Cumplimiento Volúmen
            </div>

            <div
              class="kpi-period"
              id="periodoVolumen">
              --
            </div>

          </div>

          <div class="kpi-bottom">

            <div class="kpi-progress-bg">

              <div
                class="kpi-progress-fill"
                id="progressVolumen">
              </div>

            </div>

          </div>

        </div>

        <!-- KPI 2 -->

        <div class="kpi-card">

          <div class="kpi-left">

            <div
              class="kpi-main"
              id="kpiFaenas">
              --
            </div>

            <div class="kpi-sub">
              % Cumplimiento Faenas
            </div>

            <div
              class="kpi-period"
              id="periodoFaenas">
              --
            </div>

          </div>

          <div class="kpi-bottom">

            <div class="kpi-progress-bg">

              <div
                class="kpi-progress-fill"
                id="progressFaenas">
              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- indicadores -->

      <div class="kpi-indicator">

        <div class="dot active"></div>
        <div class="dot"></div>

      </div>

      <!-- fullscreen -->

      <button
        class="fullscreen-btn"
        onclick="toggleFullscreen()"
        title="Pantalla completa"
      >
        ⛶
      </button>

    </div>

  </div>

</div>

<div class="footer">

  Última actualización:
  &nbsp;
  <span id="lastUpdate"></span>

</div>

<script>

/* =========================
   RELOJ
========================= */

function updateClock() {

  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleTimeString("es-CL");

}

setInterval(updateClock, 1000);

/* =========================
   FECHA
========================= */

function actualizarFechaHeader() {

  const now = new Date();

  const opciones = {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  };

  let fecha =
    now.toLocaleDateString("es-CL", opciones);

  fecha =
    fecha.charAt(0).toUpperCase() + fecha.slice(1);

  document.getElementById("headerDate").innerText =
    fecha;
}

/* =========================
   FOOTER
========================= */

function updateLastUpdate() {

  const now = new Date();

  const formatted = now.toLocaleString("es-CL", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  document.getElementById("lastUpdate").innerText =
    formatted;
}

/* =========================
   FULLSCREEN
========================= */

function toggleFullscreen() {

  if (!document.fullscreenElement) {

    document.documentElement.requestFullscreen();

  } else {

    document.exitFullscreen();

  }

}

/* =========================
   KPI DATA
========================= */

fetch(
  "https://raw.githubusercontent.com/angelomorales14-prog/turnos-dashboard/main/kpis.json?t=" +
  new Date().getTime()
)

.then(response => response.json())

.then(data => {

  function cargarKPI(nombreKPI, ids) {

    const registro =
      data.find(
        item => item.nombre === nombreKPI
      );

    if (!registro) {
      return;
    }

    const valor =
      Number(registro.valor);

    document.getElementById(ids.valor).innerText =
      valor + "%";

    document.getElementById(ids.periodo).innerText =
      registro.periodo;

    document.getElementById(ids.progress).style.width =
      valor + "%";
  }

  cargarKPI(
    "% Cumplimiento Volúmen",
    {
      valor: "kpiVolumen",
      periodo: "periodoVolumen",
      progress: "progressVolumen"
    }
  );

  cargarKPI(
    "% Cumplimiento Faenas",
    {
      valor: "kpiFaenas",
      periodo: "periodoFaenas",
      progress: "progressFaenas"
    }
  );

})

.catch(error => {

  console.error(error);

  document.getElementById("kpiVolumen").innerText =
    "ERROR";

  document.getElementById("kpiFaenas").innerText =
    "ERROR";

});

/* =========================
   ROTACIÓN KPI
========================= */

const cards =
  document.querySelectorAll(".kpi-card");

const dots =
  document.querySelectorAll(".dot");

let current = 0;

setInterval(() => {

  cards[current].classList.remove("active");
  dots[current].classList.remove("active");

  current =
    (current + 1) % cards.length;

  cards[current].classList.add("active");
  dots[current].classList.add("active");

}, 30000);

/* =========================
   INICIO
========================= */

updateClock();
updateLastUpdate();
actualizarFechaHeader();

setInterval(updateLastUpdate, 600000);

</script>

</body>
</html>
