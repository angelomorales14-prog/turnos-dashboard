<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Operaciones Marítimas TMQ</title>

<meta http-equiv="refresh" content="600">

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #07141f, #0b1e2d);
  color: white;
  overflow: hidden;
}

/* =========================
   HEADER CORPORATIVO
========================= */

.header {
  height: 90px;

  background: linear-gradient(
    90deg,
    #0d2435 0%,
    #12344d 50%,
    #0d2435 100%
  );

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 34px;

  border-bottom: 1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 4px 18px rgba(0,0,0,0.45),
    0 0 12px rgba(64,196,255,0.04);
}

/* lado izquierdo */

.header-left {
  display: flex;
  align-items: center;
}

/* logo */

.logo {
  height: 96px;
  object-fit: contain;

  filter:
    drop-shadow(0 0 8px rgba(255,255,255,0.05));
}

/* títulos */

.header-titles {
  display: flex;
  flex-direction: column;
  justify-content: center;

  margin-left: 100px;
}

.main-title {
  font-size: 30px;
  font-weight: 600;

  letter-spacing: 0.3px;

  color: rgba(255,255,255,0.96);

  line-height: 1.1;
}

.sub-title {
  font-size: 13px;

  margin-top: 7px;

  letter-spacing: 1.8px;

  text-transform: uppercase;

  color: rgba(255,255,255,0.58);
}

/* reloj */

.header-right {
  text-align: right;
}

.clock {
  font-size: 34px;

  font-weight: 500;

  letter-spacing: 1px;

  line-height: 1;

  color: rgba(255,255,255,0.92);

  font-variant-numeric: tabular-nums;
}

.date {
  font-size: 14px;

  margin-top: 8px;

  letter-spacing: 0.7px;

  color: rgba(255,255,255,0.50);
}

/* =========================
   CONTENIDO
========================= */

.main {
  display: flex;
  height: calc(100vh - 130px);
}

.left {
  width: 65%;
  border-right: 2px solid rgba(255,255,255,0.05);
}

.right {
  width: 35%;
  display: flex;
  flex-direction: column;
}

/* mapa */

.windy-map {
  height: 70%;
  border-bottom: 2px solid rgba(255,255,255,0.05);
}

/* =========================
   KPI PANEL
========================= */

.placeholder {

  height: 30%;

  position: relative;

  display: flex;
  flex-direction: column;

  align-items: center;
  justify-content: center;

  background:
    linear-gradient(
      180deg,
      rgba(8,18,28,0.98),
      rgba(12,28,42,0.98)
    );
}

.kpi-title {

  font-size: 16px;

  letter-spacing: 4px;

  text-transform: uppercase;

  color: rgba(255,255,255,0.48);

  margin-bottom: 24px;
}

.kpi-main {

  font-size: 42px;

  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.96);
}

.kpi-sub {

  margin-top: 16px;

  font-size: 15px;

  color: rgba(255,255,255,0.38);

  letter-spacing: 1px;
}

/* iframe */

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* =========================
   FOOTER
========================= */

.footer {
  height: 40px;

  background: #10293d;

  display: flex;
  align-items: center;

  padding: 0 20px;

  border-top: 1px solid rgba(255,255,255,0.05);

  font-size: 13px;

  opacity: 0.75;
}

/* =========================
   BOTÓN FULLSCREEN
========================= */

.fullscreen-btn {

  position: absolute;

  bottom: 14px;
  right: 14px;

  width: 52px;
  height: 52px;

  border: none;
  border-radius: 14px;

  background:
    linear-gradient(
      145deg,
      rgba(18,52,77,0.95),
      rgba(8,18,28,0.95)
    );

  color: rgba(255,255,255,0.92);

  font-size: 22px;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow:
    0 8px 18px rgba(0,0,0,0.45),
    0 0 10px rgba(64,196,255,0.08);

  border: 1px solid rgba(255,255,255,0.05);

  transition: all 0.2s ease;
}

.fullscreen-btn:hover {

  transform: scale(1.05);

  background:
    linear-gradient(
      145deg,
      rgba(24,70,105,0.98),
      rgba(10,24,36,0.98)
    );
}

</style>
</head>

<body>

<!-- =========================
     HEADER
========================= -->

<div class="header">

  <div class="header-left">

    <img
      class="logo"
      src="logo-enap.png"
      alt="ENAP TMQ"
    >

    <div class="header-titles">

      <div class="main-title">
        División de Operaciones Marítimas
      </div>

      <div class="sub-title">
        TERMINAL MARÍTIMO QUINTERO
      </div>

    </div>

  </div>

  <!-- RELOJ -->

  <div class="header-right">

    <div class="clock" id="clock">
      00:00:00
    </div>

    <div class="date" id="headerDate">
      --
    </div>

  </div>

</div>

<!-- =========================
     MAIN
========================= -->

<div class="main">

  <!-- PLANIFICACIÓN -->

  <div class="left">

    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTnbspDFRGu7908VnsnsP4y6opVzD8X2ylAfNAUv9s5oyz_EaFFcgofEwA-Hal_QQ/pubhtml?gid=1384925386&single=true&widget=false&headers=false&t=1">
    </iframe>

  </div>

  <!-- PANEL DERECHO -->

  <div class="right">

    <!-- MAPA -->

    <div class="windy-map">

      <iframe
        src="https://embed.windy.com/embed2.html?lat=-32.774&lon=-71.496&zoom=16&level=surface&overlay=wind">
      </iframe>

    </div>

    <!-- KPI PANEL -->

    <div class="placeholder">

      <div class="kpi-title">
        KPI´s P7
      </div>

      <div class="kpi-main">
        EN DESARROLLO
      </div>

      <div class="kpi-sub">
        Próximamente indicadores operacionales semanales
      </div>

      <!-- FULLSCREEN -->

      <button
        class="fullscreen-btn"
        onclick="toggleFullscreen()"
        title="Pantalla completa"
      >
        ⛶
      </button>

    </div>

  </div>

</div>

<!-- =========================
     FOOTER
========================= -->

<div class="footer">

  Última actualización:
  &nbsp;
  <span id="lastUpdate"></span>

</div>

<script>

/* =========================
   RELOJ
========================= */

function updateClock() {

  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleTimeString("es-CL");

}

setInterval(updateClock, 1000);

/* =========================
   FECHA HEADER
========================= */

function actualizarFechaHeader() {

  const now = new Date();

  const opciones = {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  };

  let fecha =
    now.toLocaleDateString("es-CL", opciones);

  fecha =
    fecha.charAt(0).toUpperCase() + fecha.slice(1);

  document.getElementById("headerDate").innerText =
    fecha;
}

/* =========================
   FOOTER
========================= */

function updateLastUpdate() {

  const now = new Date();

  const formatted = now.toLocaleString("es-CL", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  document.getElementById("lastUpdate").innerText =
    formatted;
}

/* =========================
   FULLSCREEN
========================= */

function toggleFullscreen() {

  if (!document.fullscreenElement) {

    document.documentElement.requestFullscreen();

  } else {

    document.exitFullscreen();

  }

}

/* =========================
   EJECUTAR
========================= */

updateClock();
updateLastUpdate();
actualizarFechaHeader();

/* intervalos */

setInterval(updateLastUpdate, 600000);

</script>

</body>
</html>
