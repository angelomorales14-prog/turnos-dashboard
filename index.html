<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>Operaciones Marítimas TMQ</title>

<meta http-equiv="refresh" content="600">

<style>

:root{
  --kpi-scale: 1;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #07141f, #0b1e2d);
  color: white;
  overflow: hidden;
}

.header {
  height: 90px;
  background: linear-gradient(90deg, #0d2435 0%, #12344d 50%, #0d2435 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 34px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 18px rgba(0,0,0,0.45), 0 0 12px rgba(64,196,255,0.04);
}

.header-left {
  display: flex;
  align-items: center;
}

.logo {
  height: 96px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.05));
}

.header-titles {
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-left: 100px;
}

.main-title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: rgba(255,255,255,0.96);
  line-height: 1.1;
}

.sub-title {
  font-size: 13px;
  margin-top: 7px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.58);
}

.header-right {
  text-align: right;
}

.clock {
  font-size: 34px;
  font-weight: 500;
  letter-spacing: 1px;
  line-height: 1;
  color: rgba(255,255,255,0.92);
  font-variant-numeric: tabular-nums;
}

.date {
  font-size: 14px;
  margin-top: 8px;
  letter-spacing: 0.7px;
  color: rgba(255,255,255,0.50);
}

.main {
  display: flex;
  height: calc(100vh - 130px);
}

.left {
  flex: 1.8;
  border-right: 2px solid rgba(255,255,255,0.05);
  min-width: 0;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.windy-map {
  height: 60%;
  border-bottom: 2px solid rgba(255,255,255,0.05);
}

.placeholder {
  height: 40%;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(4,14,24,0.98), rgba(7,20,32,0.98));
}

.placeholder::before {
  content: "";
  position: absolute;
  width: 480px;
  height: 480px;
  background: radial-gradient(circle, rgba(0,180,255,0.16), transparent 72%);
  filter: blur(40px);
  animation: pulseGlow 7s infinite ease-in-out;
}

@keyframes pulseGlow {
  0%   { transform: scale(1);    opacity: 0.45; }
  50%  { transform: scale(1.12); opacity: 0.75; }
  100% { transform: scale(1);    opacity: 0.45; }
}

/* =========================
   KPI CONTAINER
========================= */

.kpi-container {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
}

.kpi-card {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(15px);
  transition: opacity .8s ease, transform .8s ease;
  text-align: center;
}

.kpi-card.active {
  opacity: 1;
  transform: translateY(0);
}

.kpi-content {
  width: 90%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* =========================
   KPI TEXTOS — tamaños fijos
   escalados por JS al contenedor
========================= */

.kpi-icon {
  font-size: 48px;
  color: #29d3ff;
  margin-bottom: 10px;
  text-shadow: 0 0 25px rgba(41,211,255,.5);
}

.kpi-main {
  font-size: 140px;
  font-weight: 700;
  line-height: 1;
  color: white;
  text-shadow: 0 0 25px rgba(64,196,255,.25);
  white-space: nowrap;
}

.kpi-sub {
  margin-top: 8px;
  font-size: 26px;
  color: rgba(255,255,255,.88);
  letter-spacing: .5px;
}

.kpi-period {
  margin-top: 10px;
  font-size: 15px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
}

.kpi-label {
  margin-top: 14px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.30);
}

.kpi-bottom {
  width: 85%;
  margin-top: 18px;
}

.kpi-progress-bg {
  width: 100%;
  height: 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.08);
  overflow: hidden;
}

.kpi-progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, #00aaff, #29d3ff);
  box-shadow: 0 0 18px rgba(41,211,255,.55);
  transition: width 1s ease;
}

/* indicadores */

.kpi-indicator {
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 10;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: all 0.4s ease;
}

.dot.active {
  background: rgba(64,196,255,0.98);
  box-shadow: 0 0 14px rgba(64,196,255,0.7);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.footer {
  height: 40px;
  background: #10293d;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
  opacity: 0.75;
}

.fullscreen-btn {
  position: absolute;
  bottom: 14px;
  right: 14px;
  width: 52px;
  height: 52px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(145deg, rgba(18,52,77,0.95), rgba(8,18,28,0.95));
  color: rgba(255,255,255,0.92);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 18px rgba(0,0,0,0.45), 0 0 10px rgba(64,196,255,0.08);
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.2s ease;
  z-index: 20;
}

.fullscreen-btn:hover {
  transform: scale(1.05);
}

/* =========================
   CONDICIÓN DE PUERTO
========================= */

.left {
  display: flex;
  flex-direction: column;
}

.pan-frame {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

.pan-frame iframe {
  width: 100%;
  height: calc(100% + 90px);
  border: none;
  position: absolute;
  top: -40px;
  left: 0;
}

.cpuerto-panel {
  flex-shrink: 0;
  height: 130px;
  background: linear-gradient(180deg, #0d2d45, #0a1f30);
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
}

.cpuerto-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cpuerto-numero {
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.5px;
}

.cpuerto-condicion {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 700;
  color: #4fc3ff;
  letter-spacing: 1.5px;
}

.cpuerto-condicion i {
  font-size: 18px;
}

.cpuerto-fecha {
  font-size: 13px;
  color: rgba(255,255,255,.50);
  letter-spacing: 0.3px;
}

.cpuerto-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
  gap: 6px;
  align-items: stretch;
}

.cpuerto-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  background: rgba(255,255,255,.04);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.06);
  gap: 6px;
}

.cpuerto-titulo {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,.45);
  text-align: center;
  line-height: 1.3;
}

.cpuerto-terminal-names {
  font-size: 11px;
  color: rgba(255,255,255,.70);
  text-align: left;
  line-height: 1.8;
  width: 100%;
  padding-left: 4px;
}

.cpuerto-badge {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-align: center;
  line-height: 1.3;
}

.cpuerto-badge.si {
  background: rgba(12,157,36,0.25);
  color: #56d364;
  box-shadow: 0 0 10px rgba(86,211,100,.25);
  border: 1px solid rgba(86,211,100,.3);
}

.cpuerto-badge.no {
  background: rgba(207,18,18,0.25);
  color: #ff6b6b;
  box-shadow: 0 0 10px rgba(255,107,107,.25);
  border: 1px solid rgba(255,107,107,.3);
}

@media (max-width: 900px) {
  .main { flex-direction: column; }
  .left, .right { width: 100%; }
  .left { height: 60%; }
  .right { height: 40%; }
  .header-titles { margin-left: 20px; }
  .main-title { font-size: 22px; }
}


/* =========================
   INVERSIÓN TÉRMICA
========================= */

.inversion-panel {
  flex-shrink: 0;
  height: 64px;
  background: linear-gradient(180deg, #0a1f30, #071525);
  border-top: 1px solid rgba(255,255,255,.06);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 0;
}

.inversion-titulo {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,.40);
  width: 160px;
  flex-shrink: 0;
}

.inversion-separador {
  width: 1px;
  height: 36px;
  background: rgba(255,255,255,.08);
  margin: 0 20px;
  flex-shrink: 0;
}

.inversion-campos {
  display: flex;
  align-items: center;
  gap: 32px;
  flex: 1;
}

.inversion-campo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.inversion-campo-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,.35);
}

.inversion-campo-valor {
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,.92);
  letter-spacing: 0.3px;
  line-height: 1;
}

.inversion-estado-badge {
  padding: 4px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.inversion-estado-badge.con-inversion {
  background: rgba(255,107,107,0.15);
  color: #ff6b6b;
  border: 1px solid rgba(255,107,107,0.25);
}

.inversion-estado-badge.sin-inversion {
  background: rgba(86,211,100,0.15);
  color: #56d364;
  border: 1px solid rgba(86,211,100,0.25);
}

.inversion-hora {
  font-size: 13px;
  color: rgba(255,255,255,.45);
  letter-spacing: 0.5px;
  margin-left: auto;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <img class="logo" src="logo-enap.png" alt="ENAP TMQ">
    <div class="header-titles">
      <div class="main-title">División de Operaciones Marítimas</div>
      <div class="sub-title">TERMINAL MARÍTIMO QUINTERO</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="headerDate">--</div>
  </div>
</div>

<div class="main">

  <div class="left">

    <div class="pan-frame">
      <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHK8p5P0W2vuBI2IrQ6gRSbet5o--F0DXHduZ-0EcHf8jAjeHmhQ8eptLZ9PvPDQ/pubhtml?gid=795965662&single=true&widget=false&headers=false&t=1"></iframe>
    </div>

    <!-- INVERSIÓN TÉRMICA -->
    <div class="inversion-panel">

      <div class="inversion-titulo">Inversión Térmica</div>

      <div class="inversion-separador"></div>

      <div class="inversion-campos">

        <div class="inversion-campo">
          <div class="inversion-campo-label">Delta T</div>
          <div class="inversion-campo-valor" id="inversionDelta">--</div>
        </div>

        <div class="inversion-separador"></div>

        <div class="inversion-campo">
          <div class="inversion-campo-label">Estado</div>
          <div class="inversion-estado-badge sin-inversion" id="inversionEstado">--</div>
        </div>

        <div class="inversion-hora" id="inversionHora">--</div>

      </div>

    </div>

  </div>

  <div class="right">

    <div class="windy-map">
      <iframe src="https://embed.windy.com/embed2.html?lat=-32.774&lon=-71.496&zoom=16&level=surface&overlay=wind"></iframe>
    </div>

    <div class="placeholder">

      <div class="kpi-container">

        <!-- KPI 1 -->
        <div class="kpi-card active">
          <div class="kpi-content">
            <div class="kpi-icon"><i class="fa-solid fa-droplet"></i></div>
            <div class="kpi-main" id="kpiVolumen">--</div>
            <div class="kpi-sub">% Cumplimiento Volúmen</div>
            <div class="kpi-period" id="periodoVolumen">--</div>
            <div class="kpi-bottom">
              <div class="kpi-progress-bg">
                <div class="kpi-progress-fill" id="progressVolumen"></div>
              </div>
            </div>
            <div class="kpi-label">Indicador Operacional</div>
          </div>
        </div>

        <!-- KPI 2 -->
        <div class="kpi-card">
          <div class="kpi-content">
            <div class="kpi-icon"><i class="fa-solid fa-anchor"></i></div>
            <div class="kpi-main" id="kpiFaenas">--</div>
            <div class="kpi-sub">% Cumplimiento Faenas</div>
            <div class="kpi-period" id="periodoFaenas">--</div>
            <div class="kpi-bottom">
              <div class="kpi-progress-bg">
                <div class="kpi-progress-fill" id="progressFaenas"></div>
              </div>
            </div>
            <div class="kpi-label">Indicador Operacional</div>
          </div>
        </div>

      </div>

      <div class="kpi-indicator">
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>

      <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>

    </div>

  </div>

</div>

<div class="footer">
  Última actualización: &nbsp;<span id="lastUpdate"></span>
</div>

<script>

/* =========================
   RELOJ
========================= */
function updateClock() {
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("es-CL");
}
setInterval(updateClock, 1000);

/* =========================
   FECHA
========================= */
function actualizarFechaHeader() {
  const now = new Date();
  let fecha = now.toLocaleDateString("es-CL", {
    weekday: "long", day: "numeric",
    month: "long", year: "numeric"
  });
  fecha = fecha.charAt(0).toUpperCase() + fecha.slice(1);
  document.getElementById("headerDate").innerText = fecha;
}

/* =========================
   FOOTER
========================= */
function updateLastUpdate() {
  document.getElementById("lastUpdate").innerText =
    new Date().toLocaleString("es-CL", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
}

/* =========================
   FULLSCREEN
========================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* =========================
   ESCALAR KPI AL CONTENEDOR
   Se ejecuta al cargar y en resize.
   Mide el panel .placeholder y calcula
   un scale para que .kpi-content
   llene el espacio disponible.
========================= */
function escalarKPI() {
  const panel = document.querySelector(".placeholder");
  const contents = document.querySelectorAll(".kpi-content");

  if (!panel || !contents.length) return;

  const panelW = panel.clientWidth;
  const panelH = panel.clientHeight;

  contents.forEach(content => {
    // Reset para medir tamaño natural
    content.style.transform = "none";
    content.style.marginLeft = "0";

    const natW = content.scrollWidth;
    const natH = content.scrollHeight;

    const scaleX = (panelW * 0.85) / natW;
    const scaleY = (panelH * 0.85) / natH;

    const scale = Math.min(scaleX, scaleY, 2.3);

    // Forzar centrado explícito compatible con Tizen
    content.style.transformOrigin = "50% 50%";
    content.style.transform = `scale(${scale})`;
    content.style.position = "relative";
    content.style.left = "0";
    content.style.margin = "0 auto";
  });
}

window.addEventListener("resize", escalarKPI);

/* =========================
   KPI DATA
========================= */
fetch(
  "https://raw.githubusercontent.com/angelomorales14-prog/turnos-dashboard/main/kpis.json?t=" +
  new Date().getTime()
)
.then(r => r.json())
.then(data => {

  function cargarKPI(nombreKPI, ids) {
    const registro = data.find(item => item.nombre === nombreKPI);
    if (!registro) return;
    const valor = Number(registro.valor);
    document.getElementById(ids.valor).innerText = valor + "%";
    document.getElementById(ids.periodo).innerText = registro.periodo;
    document.getElementById(ids.progress).style.width = valor + "%";
  }

  cargarKPI("% Cumplimiento Volúmen", {
    valor: "kpiVolumen", periodo: "periodoVolumen", progress: "progressVolumen"
  });

  cargarKPI("% Cumplimiento Faenas", {
    valor: "kpiFaenas", periodo: "periodoFaenas", progress: "progressFaenas"
  });

  // Escalar después de que los datos estén cargados
  setTimeout(escalarKPI, 100);
})
.catch(error => {
  console.error(error);
  document.getElementById("kpiVolumen").innerText = "ERROR";
  document.getElementById("kpiFaenas").innerText = "ERROR";
  setTimeout(escalarKPI, 100);
});

/* =========================
   INVERSIÓN TÉRMICA
========================= */

fetch(
  "https://raw.githubusercontent.com/angelomorales14-prog/turnos-dashboard/main/inversion.json?t=" +
  new Date().getTime()
)

.then(response => response.json())

.then(data => {

  document.getElementById("inversionDelta").innerText =
    data.delta.toFixed(1) + " °C";

  const estadoEl =
    document.getElementById("inversionEstado");

  estadoEl.innerText = data.estado;

  estadoEl.className =
    "inversion-estado-badge " +
    (data.inversion
      ? "con-inversion"
      : "sin-inversion");

  document.getElementById("inversionHora").innerText =
    "Medición: " +
    data.fecha +
    " " +
    data.hora;

})

.catch(error => {

  console.error("Inversión térmica:", error);

  document.getElementById("inversionDelta").innerText =
    "--";

  document.getElementById("inversionEstado").innerText =
    "Sin datos";

  document.getElementById("inversionHora").innerText =
    "";

});
/* =========================
   ROTACIÓN KPI
========================= */
const cards = document.querySelectorAll(".kpi-card");
const dots  = document.querySelectorAll(".dot");
let current = 0;

setInterval(() => {
  cards[current].classList.remove("active");
  dots[current].classList.remove("active");
  current = (current + 1) % cards.length;
  cards[current].classList.add("active");
  dots[current].classList.add("active");
}, 30000);

/* =========================
   INICIO
========================= */
updateClock();
updateLastUpdate();
actualizarFechaHeader();
setInterval(updateLastUpdate, 600000);

// Escalar al cargar (fuentes pueden tardar)
document.fonts.ready.then(() => {
  escalarKPI();
});

</script>
</body>
</html>
