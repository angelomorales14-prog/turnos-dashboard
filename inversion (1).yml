name: Actualizar Inversión Térmica

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-inversion:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar y procesar CSV
        run: |
          python3 - << 'EOF'
          import urllib.request
          import json
          import sys

          url = "https://pronaire.mma.gob.cl/regiones/graficos/valparaiso/torre_met/Delta_48.csv"

          try:
              with urllib.request.urlopen(url, timeout=15) as r:
                  texto = r.read().decode("utf-8")
          except Exception as e:
              print(f"Error descargando CSV: {e}", file=sys.stderr)
              sys.exit(1)

          lineas = [l.strip() for l in texto.strip().split("\n") if l.strip()]
          datos = [l for l in lineas if not l.lower().startswith("fecha")]

          if not datos:
              print("CSV vacío", file=sys.stderr)
              sys.exit(1)

          ultima = datos[-1].split(",")

          fecha_hora = ultima[0].strip()
          delta = float(ultima[1].strip())

          partes = fecha_hora.split(" ")

          fecha = partes[0] if len(partes) > 1 else ""
          hora  = partes[1] if len(partes) > 1 else fecha_hora

          if delta < 2:
              estado = "SIN INVERSION"
              inversion = False
          else:
              estado = "CON INVERSION"
              inversion = True

          resultado = {
              "delta": round(delta, 1),
              "estado": estado,
              "inversion": inversion,
              "hora": hora,
              "fecha": fecha
          }

          with open("inversion.json", "w", encoding="utf-8") as f:
              json.dump(resultado, f, indent=2, ensure_ascii=False)

          print(
              f"OK: delta={delta}, estado={estado}, "
              f"hora={hora}, fecha={fecha}"
          )

          EOF

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add inversion.json

          git diff --cached --quiet || git commit -m "chore: actualizar inversion.json"

          git push
